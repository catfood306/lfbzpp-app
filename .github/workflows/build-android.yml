name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web assets
      run: npm run build || true
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Fix Gradle permissions
      run: |
        ls -la android/
        chmod +x android/gradlew || true
        ls -la android/gradlew
    
    - name: Build APK
      run: |
        cd android
        bash gradlew assembleRelease --stacktrace 2>&1 | tee build.log
        ls -la app/build/outputs/apk/release/
    
    - name: Generate keystore
      run: |
        keytool -genkey -v -keystore lfbzpp.keystore -alias lfbzpp -keyalg RSA -keysize 2048 -validity 10000 -storepass ${{ secrets.KEYSTORE_PASSWORD }} -keypass ${{ secrets.KEY_PASSWORD }} -dname "CN=Langfeng, OU=Langfeng, O=Langfeng, L=Beijing, ST=Beijing, C=CN"
        ls -la lfbzpp.keystore
    
    - name: Sign APK
      run: |
        cd android
        ls -la app/build/outputs/apk/release/
        apksigner sign --ks ../lfbzpp.keystore --ks-key-alias lfbzpp --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} --key-pass pass:${{ secrets.KEY_PASSWORD }} --out app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/app-release-unsigned.apk
        ls -la app/build/outputs/apk/release/
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-log
        path: android/build.log
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: lfbzpp-apk
        path: android/app/build/outputs/apk/release/app-release-signed.apk
